<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NHK プレミアムシネマ</title>
    <style>
        /* --- カラー変数と基本設定 (画像の色を完全再現) --- */
        :root {
            --bg-main: #222222;      /* 全体の背景（画像内の濃いグレー） */
            --bg-header: #1a1a1a;    /* ヘッダーの背景（黒に近いグレー） */
            --bg-section: #333333;   /* セクション見出しの背景 */
            --bg-card: #2a2a2a;      /* リストアイテムの背景 */
            --color-orange: #e59b3c;  /* 選択時・帯のオレンジ */
            --text-main: #ffffff;    /* メイン文字色（白） */
            --text-sub: #999999;     /* サブ文字色（薄いグレー） */
            --border-color: #151515; /* 枠線・区切り線 */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #111111;
            color: var(--text-main);
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
            display: flex;
            justify-content: center;
        }

        /* PC・タブレット・スマホ対応のコンテナ枠 */
        .app-container {
            width: 100%;
            max-width: 640px;
            background-color: var(--bg-main);
            min-height: 100vh;
            border-left: 1px solid #333;
            border-right: 1px solid #333;
            position: relative;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
        }

        /* --- ヘッダー領域 --- */
        header {
            background-color: var(--bg-header);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 12px;
            border-bottom: 1px solid var(--border-color);
        }

        .logo-area {
            width: 45%;
        }
        .logo-area img {
            width: 100%;
            height: auto;
            display: block;
            object-fit: contain;
        }

        .nav-menu {
            display: flex;
            width: 55%;
            justify-content: space-between;
        }

        .nav-item {
            text-decoration: none;
            color: var(--text-sub);
            text-align: center;
            font-size: 10px;
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            transition: color 0.2s;
        }
        .nav-item:hover {
            color: var(--color-orange);
        }
        .nav-item svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
        }

        /* --- おすすめ映画 自動スライダー --- */
        .slider-section {
            position: relative;
            overflow: hidden;
            background-color: #000;
            height: 220px;
        }

        .slider-container {
            display: flex;
            width: 100%;
            height: 100%;
            transition: transform 0.5s ease-in-out;
        }

        .slide {
            min-width: 100%;
            height: 100%;
            position: relative;
            cursor: pointer;
        }
        .slide img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* スライダーのオレンジ帯 */
        .slide-title-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            background-color: var(--color-orange);
            color: #000;
            text-align: center;
            padding: 8px 10px;
            font-size: 14px;
            font-weight: bold;
        }
        .slide-title-bar::before {
            content: '';
            position: absolute;
            top: -8px;
            left: 50%;
            transform: translateX(-50%);
            border-left: 8px solid transparent;
            border-right: 8px solid transparent;
            border-bottom: 8px solid var(--color-orange);
        }

        /* インジケーター（右下のドット） */
        .slider-dots {
            position: absolute;
            bottom: 45px;
            right: 15px;
            display: flex;
            gap: 5px;
            z-index: 10;
        }
        .dot {
            width: 8px;
            height: 8px;
            background-color: #555;
            border-radius: 1px;
        }
        .dot.active {
            background-color: var(--color-orange);
        }

        /* --- 特設バナーエリア --- */
        .banner-container {
            display: flex;
            gap: 10px;
            padding: 12px;
            background-color: var(--bg-main);
        }
        .banner {
            flex: 1;
            background-color: #ffffff;
            color: #333333;
            border-radius: 3px;
            padding: 8px;
            text-align: center;
            font-size: 11px;
            font-weight: bold;
            border: 1px solid #ccc;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            line-height: 1.3;
        }
        .banner-blue { color: #1f78b4; }
        .banner-orange { color: #e31a1c; }
        .banner span { font-size: 9px; color: #666; font-weight: normal; }

        /* --- セクションタイトル＆プレミアムなチャンネル切替タブ --- */
        .section-header {
            background-color: var(--bg-section);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            border-top: 1px solid var(--border-color);
        }
        .section-title {
            padding: 10px 12px;
            font-size: 13px;
            color: #ddd;
            font-weight: bold;
        }
        .tab-container {
            display: flex;
            height: 100%;
            padding-right: 8px;
        }
        .tab-button {
            background: none;
            border: none;
            color: #888;
            padding: 6px 12px;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            border-radius: 3px;
            margin: 4px 2px;
        }
        .tab-button:hover {
            color: #fff;
        }
        .tab-button.active {
            background-color: var(--color-orange);
            color: #000;
        }

        /* --- 今週の放送する映画 リスト --- */
        .movie-list {
            display: flex;
            flex-direction: column;
        }

        .movie-item {
            display: flex;
            padding: 12px;
            border-bottom: 1px solid var(--border-color);
            background-color: var(--bg-card);
            cursor: pointer;
            transition: background-color 0.2s;
            align-items: center;
        }
        .movie-item:hover {
            background-color: #333;
        }

        .movie-thumb {
            width: 100px;
            height: 65px;
            background-color: #000;
            margin-right: 12px;
            position: relative;
            flex-shrink: 0;
        }
        .movie-thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .badge {
            position: absolute;
            bottom: 2px;
            left: 2px;
            font-size: 8px;
            padding: 1px 4px;
            border-radius: 2px;
            color: #fff;
            font-weight: bold;
        }
        .badge-bs { background-color: #1f78b4; }
        .badge-4k { background-color: #e59b3c; color: #000; }

        .movie-info {
            flex-grow: 1;
            overflow: hidden;
        }
        .movie-title {
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 4px;
            color: #fff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .movie-desc {
            font-size: 11px;
            color: var(--text-sub);
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .movie-date {
            font-size: 11px;
            color: #bbb;
        }

        .arrow-icon {
            color: var(--text-sub);
            font-size: 14px;
            margin-left: 8px;
        }

        /* --- 詳細モーダルウィンドウ --- */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.85);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }
        .modal-overlay.open {
            opacity: 1;
            pointer-events: auto;
        }
        .modal-content {
            background-color: #222;
            width: 90%;
            max-width: 500px;
            border-radius: 6px;
            border: 1px solid #444;
            overflow: hidden;
            position: relative;
        }
        .modal-close {
            position: absolute;
            top: 10px;
            right: 12px;
            font-size: 24px;
            cursor: pointer;
            color: var(--text-sub);
            z-index: 10;
        }
        .modal-img {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }
        .modal-body {
            padding: 15px;
        }
        .modal-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 8px;
            color: var(--color-orange);
        }
        .modal-time {
            font-size: 12px;
            color: #fff;
            margin-bottom: 12px;
            background: #444;
            padding: 4px 8px;
            display: inline-block;
            border-radius: 3px;
        }
        .modal-text {
            font-size: 13px;
            color: #ddd;
            line-height: 1.5;
        }

        @media (min-width: 641px) {
            .app-container {
                margin: 20px 0;
                border-radius: 8px;
                min-height: calc(100vh - 40px);
            }
        }
    </style>
</head>
<body>

    <div class="app-container">

        <header>

        <!-- おすすめ映画 自動スライダーエリア -->
        <div class="slider-section">

        <!-- 特設バナー -->
        <div class="banner-container">

        <!-- 今週の放送する映画 セクション（タブ付き） -->
        <div class="section-header">

                <button class="tab-button active" id="tabBS" onclick="switchChannel('s1')">BS</button>

        <div class="movie-list" id="movieList">

    <!-- 詳細モーダルウィンドウ -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-content">

                <div class="modal-title" id="modalTitle">作品タイトル</div>
                <div class="modal-time" id="modalTime">放送時間</div>
                <div class="modal-text" id="modalText">作品の詳細情報</div>
            </div>
        </div>
    </div>

    <!-- 制御スクリプト -->
    <script>
        // --- 1. NHK番組表API 設定 ---
        const NHK_API_KEY = 'TuGXdS7cAwmFNxA0ntWELmFQr2Dok5Xn'; // 実際のAPIキーがあればここに入力
        const AREA = '130';    // 東京
        let currentService = 's1'; // 現在選択されているサービス (s1: BS, s5: BSP4K)
        
        // --- 2. モックデータ (BSとBSP4Kそれぞれの初期・フォールバックデータ) ---
        const mockData = {
            's1': [
                { id: "m1", title: "あまちゃん", desc: "1回 おら、この海が好きだ！", date: "2013年放送", img: "https://images.unsplash.com/photo-1534447677768-be436bb09401?w=500&q=80", type: "BS" },
                { id: "m2", title: "Nスペ 病の起源 2013", desc: "プロローグ 人類進化700万年の宿命", date: "5月18日（土） 21:40", img: "https://images.unsplash.com/photo-1506318137071-a8e063b4bec0?w=500&q=80", type: "BS" },
                { id: "m3", title: "BS歴史館", desc: "シリーズ 新発見！再現・幻の江戸城大奥", date: "毎週木曜 20:00", img: "https://images.unsplash.com/photo-1440404653325-ab127d49abc1?w=500&q=80", type: "BS" }
            ],
            's5': [
                { id: "m4", title: "【4Kシアター】アラビアのロレンス", desc: "壮大な砂漠を舞台に描かれる、歴史のうねりと男の孤独。", date: "7月24日（金） 20:00", img: "https://images.unsplash.com/photo-1509198397868-475647b2a1e5?w=500&q=80", type: "4K" },
                { id: "m5", title: "【4Kシネマ】グランド・ブダペスト・ホテル", desc: "美しくコミカルな映像美で描かれる、高級ホテルの名高きコンシェルジュの物語。", date: "7月26日（日） 14:00", img: "https://images.unsplash.com/photo-1566073771259-6a8506099945?w=500&q=80", type: "4K" }
            ]
        };

        // --- 3. おすすめ映画（上部スライダー用） ---
        const featuredMovies = [
            { title: "あまちゃん", img: "https://images.unsplash.com/photo-1534447677768-be436bb09401?w=600&q=80", desc: "東北の海を舞台に、アイドルを目指して奮闘する少女の成長物語。" },
            { title: "ニュー・シネマ・パラダイス", img: "https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?w=600&q=80", desc: "映画を愛した少年と、古びた映画館の映写技師が織りなす感動の不朽の名作。" },
            { title: "銀河鉄道の夜", img: "https://images.unsplash.com/photo-1506318137071-a8e063b4bec0?w=600&q=80", desc: "宮沢賢治の同名小説をベースに、美しく幻想的に描いた名作アニメーション映画。" }
        ];

        // --- 4. 初期化処理 ---
        let currentSlide = 0;
        document.addEventListener("DOMContentLoaded", () => {
            initSlider();
            updateDisplay(); // 初回表示のロード
            initModal();
        });

        // --- 5. カルーセルスライダーの実装 ---
        function initSlider() {
            const container = document.getElementById("sliderContainer");
            const dotsContainer = document.getElementById("sliderDots");
            
            container.innerHTML = "";
            dotsContainer.innerHTML = "";

            featuredMovies.forEach((movie, index) => {
                const slide = document.createElement("div");
                slide.className = "slide";
                slide.innerHTML = `
                    <img src="${movie.img}" alt="${movie.title}">
                    <div class="slide-title-bar">${movie.title}</div>
                `;
                slide.addEventListener("click", () => openModal(movie.title, "おすすめ映画", movie.desc, movie.img));
                container.appendChild(slide);

                const dot = document.createElement("div");
                dot.className = `dot ${index === 0 ? 'active' : ''}`;
                dotsContainer.appendChild(dot);
            });

            setInterval(() => {
                currentSlide = (currentSlide + 1) % featuredMovies.length;
                updateSlider();
            }, 3500);
        }

        function updateSlider() {
            const container = document.getElementById("sliderContainer");
            if(container) container.style.transform = `translateX(-${currentSlide * 100}%)`;
            
            const dots = document.querySelectorAll(".slider-dots .dot");
            dots.forEach((dot, idx) => {
                if(idx === currentSlide) dot.classList.add("active");
                else dot.classList.remove("active");
            });
        }

        // --- 6. チャンネル切り替えロジック ---
        function switchChannel(serviceId) {
            currentService = serviceId;
            
            // タブのボタンの見た目を更新
            document.getElementById("tabBS").classList.toggle("active", serviceId === 's1');
            document.getElementById("tab4K").classList.toggle("active", serviceId === 's5');
            
            updateDisplay();
        }

        function updateDisplay() {
            // まずは即座に選択されたチャンネルのモックデータを表示して描画バグを防ぐ
            renderMovies(mockData[currentService]);

            // APIキーが存在すればバックグラウンドで最新データをロードしにいく
            if (NHK_API_KEY) {
                loadProgramTable(currentService);
            }
        }

        // --- 7. 番組表の自動更新処理 ---
        async function loadProgramTable(service) {
            const today = new Date().toISOString().split('T')[0];
            const url = `https://api.nhk.or.jp/v2/pg/list/${AREA}/${service}/${today}.json?key=${NHK_API_KEY}`;

            try {
                const response = await fetch(url);
                if (!response.ok) throw new Error();
                const data = await response.json();
                
                const programs = data.list[service];
                // 映画ジャンル「0600」に該当するものを抽出
                const moviePrograms = programs.filter(p => p.genre && p.genre.includes("0600")).map(p => {
                    return {
                        id: p.id,
                        title: p.title,
                        desc: p.subtitle || p.content,
                        date: formatNHKDate(p.start_time),
                        img: p.service.logo_l.url || "https://placehold.co/100x65/333/fff?text=映画",
                        type: service === 's1' ? "BS" : "4K"
                    };
                });

                // リクエスト中にユーザーが別のタブに切り替えていなければ画面に反映
                if(moviePrograms.length > 0 && currentSer
