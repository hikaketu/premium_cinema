<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NHK プレミアムシネマ</title>
    <!-- FontAwesome Icon Library -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* --- カラーパレット & 基本設定（画像の色味を再現） --- */
        :root {
            --bg-dark: #1e1f23;
            --bg-card: #28292d;
            --bg-header: #232428;
            --accent-orange: #e68308;
            --accent-orange-hover: #ff981a;
            --text-main: #ffffff;
            --text-sub: #b0b3b8;
            --border-color: #3a3b40;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        /* アプリ風コンテナ（レスポンシブ） */
        .app-container {
            width: 100%;
            max-width: 600px; /* タブレット・PCでは中央寄せカード風表示 */
            background-color: var(--bg-dark);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            position: relative;
        }

        /* --- ヘッダー --- */
        header {
            background-color: var(--bg-header);
            padding: 10px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-logo img {
            height: 38px;
            width: auto;
            object-fit: contain;
            display: block;
        }

        .header-nav {
            display: flex;
            gap: 12px;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: var(--text-sub);
            text-decoration: none;
            font-size: 10px;
            transition: color 0.2s;
        }

        .nav-item i {
            font-size: 16px;
            margin-bottom: 3px;
        }

        .nav-item:hover {
            color: var(--accent-orange);
        }

        /* --- スライダー（おすすめ映画） --- */
        .slider-section {
            position: relative;
            width: 100%;
            background-color: #000;
            overflow: hidden;
        }

        .slider-container {
            display: flex;
            transition: transform 0.5s ease-in-out;
            width: 100%;
        }

        .slide-item {
            min-width: 100%;
            position: relative;
            cursor: pointer;
        }

        .slide-item img {
            width: 100%;
            height: 220px;
            object-fit: cover;
            display: block;
        }

        .slider-dots {
            position: absolute;
            bottom: 45px;
            right: 15px;
            display: flex;
            gap: 5px;
            z-index: 10;
        }

        .dot {
            width: 8px;
            height: 8px;
            background-color: rgba(255, 255, 255, 0.5);
            border-radius: 2px;
        }

        .dot.active {
            background-color: var(--accent-orange);
        }

        /* スライダー下のオレンジラベル */
        .slider-caption {
            background-color: var(--accent-orange);
            color: #fff;
            padding: 10px 15px;
            text-align: center;
            font-weight: bold;
            font-size: 15px;
            position: relative;
        }

        .slider-caption::before {
            content: '';
            position: absolute;
            top: -6px;
            left: 50%;
            transform: translateX(-50%);
            border-left: 7px solid transparent;
            border-right: 7px solid transparent;
            border-bottom: 7px solid var(--accent-orange);
        }

        /* --- バナーエリア --- */
        .banner-group {
            display: flex;
            gap: 10px;
            padding: 12px 15px;
            background-color: var(--bg-dark);
        }

        .banner-btn {
            flex: 1;
            background: linear-gradient(180deg, #1f425e 0%, #0d2338 100%);
            border: 1px solid #32648e;
            border-radius: 4px;
            padding: 8px 5px;
            color: #5bb2e6;
            font-size: 11px;
            font-weight: bold;
            text-align: center;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }

        .banner-btn span {
            color: #fff;
            font-size: 9px;
            display: block;
            margin-top: 2px;
        }

        /* --- リストセクション（今週放送する映画） --- */
        .section-header {
            background-color: #2d2e33;
            padding: 10px 15px;
            font-size: 14px;
            font-weight: bold;
            color: var(--text-main);
            border-bottom: 1px solid var(--border-color);
        }

        .program-list {
            display: flex;
            flex-direction: column;
        }

        .program-card {
            display: flex;
            align-items: center;
            padding: 12px 15px;
            background-color: var(--bg-card);
            border-bottom: 1px solid var(--border-color);
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .program-card:hover {
            background-color: #323338;
        }

        .program-thumb {
            width: 100px;
            height: 60px;
            object-fit: cover;
            border-radius: 3px;
            margin-right: 12px;
            flex-shrink: 0;
            background-color: #000;
        }

        .program-info {
            flex: 1;
            overflow: hidden;
        }

        .program-title {
            font-size: 15px;
            font-weight: bold;
            color: #fff;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .program-desc {
            font-size: 12px;
            color: var(--text-sub);
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .program-date {
            font-size: 11px;
            color: var(--text-sub);
        }

        .arrow-icon {
            color: var(--text-sub);
            font-size: 14px;
            margin-left: 10px;
        }

        /* --- 詳細表示モーダル --- */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 20px;
        }

        .modal-content {
            background-color: var(--bg-card);
            width: 100%;
            max-width: 500px;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid var(--border-color);
            position: relative;
        }

        .modal-header img {
            width: 100%;
            max-height: 250px;
            object-fit: cover;
        }

        .modal-body {
            padding: 20px;
        }

        .modal-title {
            font-size: 18px;
            font-weight: bold;
            color: var(--accent-orange);
            margin-bottom: 8px;
        }

        .modal-meta {
            font-size: 12px;
            color: var(--text-sub);
            margin-bottom: 12px;
        }

        .modal-desc {
            font-size: 14px;
            line-height: 1.6;
            color: #e0e0e0;
            margin-bottom: 20px;
        }

        .close-btn {
            background-color: var(--accent-orange);
            color: #fff;
            border: none;
            width: 100%;
            padding: 10px 0;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
        }

        /* Responsive Breakpoints (PC / Tablet) */
        @media (min-width: 601px) {
            body {
                padding: 20px 0;
                background-color: #121214;
            }
            .app-container {
                border-radius: 8px;
                overflow: hidden;
            }
        }
    </style>
</head>
<body>

<div class="app-container">
    <!-- ヘッダー -->
    <header>
        <div class="header-logo">
            <!-- 左上に右のロゴ画像を配置 -->
            <img src="IMG_1294-removebg-preview.png" alt="プレミアムシネマ">
        </div>
        <nav class="header-nav">
            <!-- 右上のナビゲーション：すべてNHKへリダイレクト -->
            <a href="https://www.nhk.jp/g/ts/K8649395M1/blog/bl/p5D796g6OV/" class="nav-item" target="_blank" rel="noopener">

            <a href="https://www.nhk.jp/g/ts/K8649395M1/blog/bl/pLAv8dgRAB/" class="nav-item" target="_blank" rel="noopener">

                <span>映画カレンダー</span>

            </a>
        </nav>
    </header>

    <!-- メインコンテンツ -->
    <main>
        <!-- おすすめ映画自動スライダー -->
        <section class="slider-section">
            <div class="slider-container" id="sliderContainer">
                <!-- JavaScriptで動的生成 -->
            </div>
            <div class="slider-dots" id="sliderDots"></div>
            <div class="slider-caption" id="sliderCaption">読み込み中...</div>
        </section>

        <!-- パックバナー風ボタン -->
        <div class="banner-group">
            <a href="https://www.nhk.jp/g/ts/K8649395M1/blog/bl/pLAv8dgRAB/bp/pnkd9Vdxr2/" class="banner-btn" target="_blank" rel="noopener">
                <div>今月の映画カレンダー<br><span>NHKサイトにリダイレクト</span></div>
            </a>
            <a href="https://www.nhk.jp/g/ts/K8649395M1/blog/bl/pLAv8dgRAB/bp/p8BW6rErrK/" class="banner-btn" target="_blank" rel="noopener">
                <div>来月の映画カレンダー<br><span>NHKサイトにリダイレクト</span></div>
            </a>
        </div>

        <!-- 今週放送する映画リスト（番組表API連動） -->
        <section>
            <div class="section-header">今週放送する映画</div>
            <div class="program-list" id="programList">
                <!-- JavaScriptで自動更新 -->
            </div>
        </section>
    </main>
</div>

<!-- 作品詳細モーダル -->
<div class="modal-overlay" id="detailModal">
    <div class="modal-content">
        <div class="modal-header">
            <img id="modalImg" src="" alt="作品画像">
        </div>
        <div class="modal-body">
            <div class="modal-title" id="modalTitle"></div>
            <div class="modal-meta" id="modalMeta"></div>
            <div class="modal-desc" id="modalDesc"></div>
            <button class="close-btn" onclick="closeModal()">閉じる</button>
        </div>
    </div>
</div>

<script>
    /* --- おすすめ映画（スライダーデータ） --- */
    const recommendedMovies = [
        {
            title: "あまちゃん",
            subtitle: "第1回 おら、この海が好きだ！",
            date: "2013年放送",
            desc: "北三陸の豊かな自然と温かい人々の中で、アイドルを目指して成長していくヒロインの姿を描く人気連続テレビ小説。",
            img: "https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=800&q=80"
        },
        {
            title: "銀河鉄道の夜",
            subtitle: "デジタルリマスター版",
            date: "今週金曜 21:00 放送",
            desc: "宮沢賢治の名作文学を幻想的にアニメーション化した不朽の名作。少年ジョバンニとカンパネルラの銀河をめぐる旅。",
            img: "https://images.unsplash.com/photo-1518709268805-4e9042af9f23?w=800&q=80"
        },
        {
            title: "七人の侍",
            subtitle: "4Kデジタルリマスター版",
            date: "今週土曜 13:00 放送",
            desc: "黒澤明監督による世界映画史に残る金字塔。野武士の襲撃に悩む農民を守るため集まった7人の侍たちの壮絶な戦い。",
            img: "https://images.unsplash.com/photo-1533929736458-ca588d08c8be?w=800&q=80"
        }
    ];

    /* --- 今週放送する映画（APIデータフォールバック付き） --- */
    const fallbackPrograms = [
        {
            title: "あまちゃん",
            subtitle: "1回 おら、この海が好きだ！",
            date: "2013年放送",
            desc: "東北・北三陸を舞台に、潜水漁とアイドル活動に奔走するヒロインの奮闘記。",
            img: "https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=300&q=80"
        },
        {
            title: "Nスペ 病の起源 2013",
            subtitle: "プロローグ 人類進化700万年の試練",
            date: "5月18日（土）21:40",
            desc: "人類が進化の過程で抱え込んだ病気のルーツを最新科学で読み解くドキュメンタリー。",
            img: "https://images.unsplash.com/photo-1516339901601-2e1b62dc0c45?w=300&q=80"
        },
        {
            title: "ＢＳ歴史館",
            subtitle: "勝海舟 江戸城無血開城の真実",
            date: "5月20日（月）19:00",
            desc: "幕末の動乱期において、江戸の街を火の海から救った勝海舟の外交手腕と戦略に迫る。",
            img: "https://images.unsplash.com/photo-1461360370896-922624d12aa1?w=300&q=80"
        },
        {
            title: "シネマ「東京物語」",
            subtitle: "小津安二郎監督 名作映画選",
            date: "5月22日（水）13:00",
            desc: "尾道から上京した老夫婦と子供たちとの交流を通じて、家族の変容を描いた名作。",
            img: "https://images.unsplash.com/photo-1485846234645-a62644f84728?w=300&q=80"
        }
    ];

    /* --- スライダー実装 --- */
    let currentSlide = 0;
    function initSlider() {
        const container = document.getElementById('sliderContainer');
        const dotsContainer = document.getElementById('sliderDots');

        recommendedMovies.forEach((movie, index) => {
            // スライド要素生成
            const slide = document.createElement('div');
            slide.className = 'slide-item';
            slide.onclick = () => openModal(movie);
            slide.innerHTML = `<img src="${movie.img}" alt="${movie.title}">`;
            container.appendChild(slide);

            // ドット生成
            const dot = document.createElement('div');
            dot.className = `dot ${index === 0 ? 'active' : ''}`;
            dotsContainer.appendChild(dot);
        });

        updateSlider();

        // 自動スライド (4秒間隔)
        setInterval(() => {
            currentSlide = (currentSlide + 1) % recommendedMovies.length;
            updateSlider();
        }, 4000);
    }

    function updateSlider() {
        const container = document.getElementById('sliderContainer');
        const dots = document.querySelectorAll('.dot');
        const caption = document.getElementById('sliderCaption');

        container.style.transform = `translateX(-${currentSlide * 100}%)`;
        caption.innerText = recommendedMovies[currentSlide].title;

        dots.forEach((dot, idx) => {
            dot.classList.toggle('active', idx === currentSlide);
        });
    }

/* --- 番組表データ取得 & リスト描画 --- */
async function fetchProgramTable() {
    try {
        // GitHub Actionsで生成された program.json を取得
        const res = await fetch('./program.json');
        if (!res.ok) throw new Error("program.jsonが見つかりません");

        const data = await res.json();
        let formattedData = formatApiData(data);

        // データが0件またはうまく変換できなかった場合はサンプルを表示
        if (!formattedData || formattedData.length === 0) {
            console.log("データ構造が合わないためフォールバックを表示します");
            formattedData = fallbackPrograms;
        }

        renderPrograms(formattedData);
    } catch (err) {
        console.log("読み込みエラー:", err.message);
        // エラー時もサンプルを表示
        renderPrograms(fallbackPrograms);
    }
}

/* --- どんな構造のJSONからでも番組データを自動抽出する万能関数 --- */
function formatApiData(data) {
    if (!data) return [];

    // JSON内の全階層から title を持つ番組データを探し出す
    const items = [];
    function extractItems(obj) {
        if (!obj || typeof obj !== 'object') return;
        if (Array.isArray(obj)) {
            obj.forEach(extractItems);
            return;
        }
        // title プロパティを持っていれば番組データとして回収
        if (obj.title && typeof obj.title === 'string') {
            items.push(obj);
            return;
        }
        Object.values(obj).forEach(extractItems);
    }

    extractItems(data);

    // 見つからない場合は空を返す
    if (items.length === 0) return [];

    // 画面表示用にデータを整える
    return items.map(item => {
        let dateStr = "放送日時未定";
        if (item.start_time) {
            const startTime = new Date(item.start_time);
            const month = startTime.getMonth() + 1;
            const date = startTime.getDate();
            const hours = String(startTime.getHours()).padStart(2, '0');
            const minutes = String(startTime.getMinutes()).padStart(2, '0');
            dateStr = `${month}月${date}日 ${hours}:${minutes}`;
        }

        return {
            title: item.title || "番組タイトルなし",
            subtitle: item.subtitle || item.content || item.description || "",
            date: dateStr,
            desc: item.content || item.act || item.description || "詳細情報はありません。",
            img: item.service_logo?.url || item.thumbnail || "https://images.unsplash.com/photo-1485846234645-a62644f84728?w=300&q=80"
        };
    });
}


    // それでも配列が取れなかった場合
    if (!list || !Array.isArray(list)) return [];

    return list.map(item => {
        let dateStr = "放送日時未定";
        if (item.start_time) {
            const startTime = new Date(item.start_time);
            const month = startTime.getMonth() + 1;
            const date = startTime.getDate();
            const hours = String(startTime.getHours()).padStart(2, '0');
            const minutes = String(startTime.getMinutes()).padStart(2, '0');
            dateStr = `${month}月${date}日 ${hours}:${minutes}`;
        }

        return {
            title: item.title || "番組タイトルなし",
            subtitle: item.subtitle || item.content || "",
            date: dateStr,
            desc: item.content || item.act || "詳細情報はありません。",
            img: item.service_logo?.url || "https://images.unsplash.com/photo-1485846234645-a62644f84728?w=300&q=80"
        };
    });
}

    
/* --- NHK APIなどのJSONデータを画面用データに変換する関数 --- */
function formatApiData(data) {
    // すでに整理済みの配列ならそのまま使う
    if (Array.isArray(data)) return data;

    // NHK API構造から番組リストを取り出す
    const list = data?.list?.g1 || data?.list?.e1 || data?.list?.b1 || data?.list?.s1 || [];

    return list.map(item => {
        let dateStr = "放送日時未定";
        if (item.start_time) {
            const startTime = new Date(item.start_time);
            const month = startTime.getMonth() + 1;
            const date = startTime.getDate();
            const hours = String(startTime.getHours()).padStart(2, '0');
            const minutes = String(startTime.getMinutes()).padStart(2, '0');
            dateStr = `${month}月${date}日 ${hours}:${minutes}`;
        }

        return {
            title: item.title || "番組タイトルなし",
            subtitle: item.subtitle || item.content || "",
            date: dateStr,
            desc: item.content || item.act || "詳細情報はありません。",
            img: item.service_logo?.url || "https://images.unsplash.com/photo-1485846234645-a62644f84728?w=300&q=80"
        };
    });
}


    function renderPrograms(programs) {
        const listContainer = document.getElementById('programList');
        listContainer.innerHTML = '';

        programs.forEach(item => {
            const card = document.createElement('div');
            card.className = 'program-card';
            card.onclick = () => openModal(item);

            card.innerHTML = `
                <img class="program-thumb" src="${item.img}" alt="${item.title}">
                <div class="program-info">
                    <div class="program-title">${item.title}</div>
                    <div class="program-desc">${item.subtitle}</div>
                    <div class="program-date">${item.date}</div>
                </div>
                <i class="fa-solid fa-chevron-right arrow-icon"></i>
            `;
            listContainer.appendChild(card);
        });
    }

    /* --- モーダル（詳細表示）機能 --- */
    function openModal(item) {
        document.getElementById('modalImg').src = item.img;
        document.getElementById('modalTitle').innerText = item.title;
        document.getElementById('modalMeta').innerText = `${item.subtitle} | ${item.date}`;
        document.getElementById('modalDesc').innerText = item.desc;
        document.getElementById('detailModal').style.display = 'flex';
    }

    function closeModal() {
        document.getElementById('detailModal').style.display = 'none';
    }

    // モーダル背景クリックで閉じる
    window.onclick = function(event) {
        const modal = document.getElementById('detailModal');
        if (event.target === modal) {
            closeModal();
        }
    }

    // 初期化実行
    window.onload = function() {
        initSlider();
        fetchProgramTable();
    };
</script>
</body>
</html>
