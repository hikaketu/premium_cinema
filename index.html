<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>プレミアムシネマ</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <div class="logo">
        プレミアムシネマ
    </div>

    <nav>
        <a href="#today">放送予定</a>
        <a href="#calendar">映画カレンダー</a>
        <a href="column.html">シネフィルコラム</a>
    </nav>
</header>

<section class="hero">

    <div class="hero-image">
        <img id="heroImage" src="noimage.png" alt="">
    </div>

    <div class="hero-text">

        <h1 id="heroTitle">
            今週のプレミアムシネマ
        </h1>

        <p id="heroDate"></p>

        <p id="heroDescription"></p>

        <div class="hero-buttons">

            <a id="nhkLink"
               href="#"
               target="_blank"
               class="button">
               NHKで見る
            </a>

            <a href="https://www.nhk.or.jp/uts/premium_cinema/form.html"
               target="_blank"
               class="button">
               映画リクエスト
            </a>

        </div>

    </div>

</section>

<main>

<section id="today">

<h2>
今後の放送予定
</h2>

<div id="programList">

<div class="loading">
読み込み中...
</div>

</div>

</section>

<section id="calendar">

<h2>
映画カレンダー
</h2>

<div id="calendarArea">

</div>

</section>

<section>

<h2>
シネフィルコラム
</h2>

<div class="column-box">

<p>

プレミアムシネマに関するコラムや映画紹介を掲載します。

</p>

<a href="column.html" class="button">

もっと見る

</a>

</div>

</section>

</main>

<footer>

<p>

© Premium Cinema Fan Site

</p>

</footer>

<script src="app.js"></script>
<script src="calendar.js"></script>

</body>
</html>
