<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NHK Premium Cinema (On Demand Style)</title>
<style>
    :root {
        --bg-dark: #262626;
        --bg-gray: #4b4b4b;
        --accent-orange: #f8a339;
        --text-white: #ffffff;
        --text-gray: #a0a0a0;
        --border-blue: #2a75a9;
        --border-orange: #d97d3a;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
    
    body {
        background-color: var(--bg-dark);
        color: var(--text-white);
        max-width: 480px;
        margin: 0 auto;
    }

    header {
        background-color: var(--bg-gray);
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 10px;
        border-bottom: 2px solid #1a1a1a;
    }
    .logo { font-weight: bold; font-size: 14px; font-style: italic; }
    .nav-icons { display: flex; gap: 15px; font-size: 10px; color: var(--text-gray); }
    .nav-icons div { text-align: center; }

    .hero-area { width: 100%; height: 200px; background-color: #000; overflow: hidden; position: relative;}
    .hero-area img { width: 100%; height: 100%; object-fit: cover; opacity: 0.8; }
    
    .hero-title-bar {
        background-color: var(--accent-orange);
        color: var(--text-white);
        text-align: center;
        padding: 10px;
        font-weight: bold;
        position: relative;
    }
    .hero-title-bar::before {
        content: "";
        position: absolute;
        top: -10px; left: 50%;
        transform: translateX(-50%);
        border-width: 0 10px 10px 10px;
        border-style: solid;
        border-color: transparent transparent var(--accent-orange) transparent;
    }

    .pack-banners {
        display: flex;
        gap: 10px;
        padding: 15px 10px;
        background-color: var(--bg-dark);
    }
    .pack-btn {
        flex: 1;
        background-color: var(--text-white);
        padding: 10px;
        text-align: center;
        font-weight: bold;
        font-size: 12px;
    }
    .pack-orange { color: var(--border-orange); border: 2px solid var(--border-orange); }
    .pack-blue { color: var(--border-blue); border: 2px solid var(--border-blue); }

    .list-header {
        background-color: var(--bg-gray);
        padding: 10px;
        font-size: 14px;
        border-top: 1px solid #555;
        border-bottom: 1px solid #1a1a1a;
    }

    .program-list { list-style: none; }
    .program-item {
        display: flex;
        padding: 15px 10px;
        border-bottom: 1px solid var(--bg-gray);
        align-items: center;
    }
    .program-thumb {
        width: 120px;
        height: 68px;
        background-color: #000;
        margin-right: 15px;
        position: relative;
    }
    .program-thumb img { width: 100%; height: 100%; object-fit: cover; }
    
    .thumb-label {
        position: absolute;
        bottom: 0; left: 0;
        background-color: var(--accent-orange);
        color: var(--text-white);
        font-size: 10px;
        padding: 2px 5px;
    }

    .program-info { flex: 1; }
    .program-title { font-size: 14px; margin-bottom: 5px; }
    .program-desc { font-size: 12px; color: var(--text-gray); margin-bottom: 2px; }
    .chevron { color: var(--text-gray); font-weight: bold; padding-left: 10px; }
</style>
</head>
<body>

<div class="app-container">
    <header>
        <div class="logo">NHK<br>オンデマンド</div>
        <div class="nav-icons">
            <div>層<br>ジャンル</div>
            <div>🔍<br>検索</div>
            <div>★<br>マイコンテンツ</div>
            <div>⚙<br>その他</div>
        </div>
    </header>

    <div class="hero-area">
        <img id="hero-img" src="" alt="Hero Movie">
    </div>
    <div class="hero-title-bar" id="hero-title">読み込み中...</div>

    <div class="pack-banners">
        <div class="pack-btn pack-orange">見逃し見放題パック<br>月額945円(税込み)</div>
        <div class="pack-btn pack-blue">特選見放題パック<br>月額945円(税込み)</div>
    </div>

    <div class="list-header">人気のある番組（プレミアムシネマ）</div>
    
    <ul class="program-list" id="program-container">
        <!-- JavaScriptがここにリストを自動挿入します -->
    </ul>
</div>

<!-- ここから下がJavaScriptの処理です -->
<script>
    async function updateProgramList() {
        try {
            // ▼▼▼ ① ここに実際の番組表APIのURLを入れてください ▼▼▼
            const apiUrl = '【https://program-api.nhk.jp/v3/papiPgNowTv?service=tv&area=130&key=TuGXdS7cAwmFNxA0ntWELmFQr2Dok5Xn】';
            
            const response = await fetch(apiUrl);
            const data = await response.json();

            // ▼▼▼ ② JSONの構造に合わせてキー名（.hero.imageUrl など）を書き換えてください ▼▼▼
            document.getElementById('hero-img').src = data.hero.imageUrl;
            document.getElementById('hero-title').textContent = data.hero.title;

            
            const container = document.getElementById('program-container');
            container.innerHTML = ''; 

            // ▼▼▼ ③ リストのループ処理（.programs など）を書き換えてください ▼▼▼
            data.movieList.forEach(program => {
                const li = document.createElement('li');
                li.className = 'program-item';
                
                const labelBg = program.type === '特選' ? 'var(--border-blue)' : 'var(--accent-orange)';

                li.innerHTML = `
                    <div class="program-thumb">
                        <img src="${program.thumbnailUrl}" alt="${program.title}">
                        <div class="thumb-label" style="background-color: ${labelBg}">${program.type}</div>
                    </div>
                    <div class="program-info">
                        <div class="program-title">${program.title}</div>
                        <div class="program-desc">${program.subtitle}</div>
                        <div class="program-desc">${program.date}</div>
                    </div>
                    <div class="chevron">＞</div>
                `;
                container.appendChild(li);
            });
        } catch (error) {
            console.error("APIの読み込みに失敗しました:", error);
            document.getElementById('hero-title').textContent = "データ取得エラー";
        }
    }

    // ページ読み込み時に自動実行
    document.addEventListener('DOMContentLoaded', updateProgramList);
</script>
</body>
</html>
