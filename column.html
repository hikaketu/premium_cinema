<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>シネフィルコラム</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header>

<div class="logo">

プレミアムシネマ

</div>

<nav>

<a href="index.html">トップ</a>

<a href="index.html#today">放送予定</a>

<a href="index.html#calendar">映画カレンダー</a>

</nav>

</header>

<main>

<section>

<h2>

シネフィルコラム

</h2>

<div id="columnList">

</div>

</section>

</main>

<footer>

© Premium Cinema Fan Site

</footer>

<script>

const columns=[

{
title:"名作映画の魅力",
date:"2026-07-20",
text:"プレミアムシネマで放送された名作映画を紹介します。"
},

{
title:"監督特集",
date:"2026-07-18",
text:"世界の名監督と代表作品を紹介します。"
},

{
title:"映画音楽特集",
date:"2026-07-15",
text:"心に残る映画音楽を振り返ります。"
},

{
title:"プレミアムシネマ放送ガイド",
date:"2026-07-10",
text:"今月放送予定の見どころを紹介します。"
}

];

const area=document.getElementById("columnList");

columns.forEach(c=>{

const box=document.createElement("div");

box.className="card";

box.innerHTML=`

<div class="card-body">

<div class="card-title">

${c.title}

</div>

<div class="card-date">

${c.date}

</div>

<div class="card-description">

${c.text}

</div>

</div>

`;

area.appendChild(box);

});

</script>

</body>
</html>
